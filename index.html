<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกการเงิน</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <h1>💰 บันทึกการเบิก-คืน</h1>
        </header>

        <main class="content">
            <section class="section">
                <label class="section-label">👤 ชื่อผู้เบิก/คืน</label>
                <input type="text" id="userName" class="main-input" placeholder="พิมพ์ชื่อตรงนี้...">
            </section>

            <div class="action-toggle">
                <button id="typeWithdraw" class="toggle-item active" onclick="changeType('withdraw')">เบิกเงิน</button>
                <button id="typeReturn" class="toggle-item" onclick="changeType('return')">คืนเงิน</button>
            </div>

            <div class="action-area">
                <button id="btnQuickWithdraw" class="btn-main-action" onclick="saveData(200)">
                    บันทึกเบิกเงิน <strong>200 ฿</strong>
                </button>

                <div id="returnInputWrapper" class="input-wrapper" style="display: none;">
                    <input type="number" id="returnAmount" class="main-input" placeholder="ระบุยอดเงินที่คืน" inputmode="numeric">
                    <button class="btn-save-return" onclick="handleReturnSave()">บันทึกการคืน</button>
                </div>
            </div>

            <div class="total-display">
                <p>ยอดรวมทั้งหมดวันนี้</p>
                <h2 id="totalBaht">0 ฿</h2>
            </div>

            <section class="history-section">
                <h3 class="section-label">📋 ประวัติรายการ</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>เวลา</th>
                                <th>ชื่อ</th>
                                <th>ประเภท</th>
                                <th>จำนวนเงิน</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
