<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการเงิน</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <h1>💰 บันทึกการเงิน</h1>
                <span>200 บาท = 1 ขีด</span>
            </div>
            <button class="btn-reset" onclick="resetAll()">🔄 รีเซ็ต</button>
        </header>

        <main class="content">
            <section class="section">
                <label class="section-label">👤 เลือกผู้เบิก/คืน</label>
                <div class="chip-group" id="userSelector">
                    <button class="chip active" onclick="selectUser('มด', this)">มด</button>
                    <button class="chip" onclick="selectUser('Rex', this)">Rex</button>
                    <button class="chip" onclick="selectUser('นิว', this)">นิว</button>
                    <button class="chip btn-add-user">+</button>
                </div>
            </section>

            <div class="action-toggle">
                <button id="typeWithdraw" class="toggle-item active" onclick="changeType('withdraw')">เบิกเงิน</button>
                <button id="typeReturn" class="toggle-item" onclick="changeType('return')">คืนเงิน</button>
            </div>

            <div class="action-area">
                <button id="btnQuickWithdraw" class="btn-main-action" onclick="saveData(200)">
                    บันทึกเบิกเงิน <strong>200 ฿</strong>
                </button>

                <div id="returnInputWrapper" class="input-wrapper" style="display: none;">
                    <input type="number" id="returnAmount" placeholder="ระบุจำนวนเงินที่คืน" inputmode="numeric">
                    <button class="btn-save-return" onclick="handleReturnSave()">บันทึกการคืน</button>
                </div>
            </div>

            <div class="total-display">
                <p>ยอดรวมวันนี้</p>
                <h2 id="totalText">0 ฿</h2>
                <span id="unitText">0 ขีด</span>
            </div>

            <section class="history-section">
                <h3 class="section-label">📋 ประวัติรายการ</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>เวลา</th>
                                <th>ชื่อ</th>
                                <th>ประเภท</th>
                                <th>จำนวน</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
